# ===================================================================
# Application
# ===================================================================
spring.application.name=siletry

# ===================================================================
# Datasource
# ===================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/siletry}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================================================================
# OpenAI
# ===================================================================
openai.api.key=${OPENAI_API_KEY:}
openai.api.model=gpt-4o-mini

# ===================================================================
# Sarvam
# ===================================================================
sarvam.api.key=${SARVAM_API_KEY:}
sarvam.api.base-url=https://api.sarvam.ai

# ===================================================================
# SendGrid
# ===================================================================
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:noreply@siletry.com}

# ===================================================================
# Liquibase
# ===================================================================
spring.liquibase.change-log=classpath:db/migration/master/changelog-master.xml

# ===================================================================
# Redis
# ===================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ===================================================================
# Server
# ===================================================================
server.port=${PORT:8080}

# ===================================================================
# JWT
# ===================================================================
jwt.secret=${JWT_SECRET:change-this-in-production-please}
jwt.expiration-ms=86400000

# ===================================================================
# WhatsApp
# ===================================================================
whatsapp.webhook.verify-token=${WHATSAPP_VERIFY_TOKEN:change-this-token}
whatsapp.api.app-secret=${WHATSAPP_APP_SECRET:}
whatsapp.api.access-token=${WHATSAPP_ACCESS_TOKEN:}
whatsapp.api.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.api.base-url=https://graph.facebook.com/v21.0

# ===================================================================
# Admin endpoint protection (/api/tenants/provision)
# ===================================================================
admin.secret=${ADMIN_SECRET:change-this-in-production-please}

# ===================================================================
# CORS (comma-separated if multiple origins)
# ===================================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=TRACE
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
# ===================================================================
# Actuator
# ===================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ===================================================================
# Logging
# ===================================================================
logging.level.com.gatistack.siletry=INFO