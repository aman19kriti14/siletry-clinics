# ===================================================================
# Application
# ===================================================================
spring.application.name=siletry

# ===================================================================
# Datasource
# ===================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/siletry}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# ===================================================================
# JPA / Hibernate
# ===================================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# ===================================================================
# Liquibase
# ===================================================================
spring.liquibase.change-log=classpath:db/migration/master/changelog-master.xml


# ===================================================================
# Redis
# ===================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ===================================================================
# Server
# ===================================================================
server.port=${PORT:8080}

# ===================================================================
# JWT
# ===================================================================
jwt.secret=${JWT_SECRET:change-this-in-production-please}
jwt.expiration-ms=86400000

# ===================================================================
# Admin endpoint protection (/api/tenants/provision)
# ===================================================================
admin.secret=${ADMIN_SECRET:change-this-in-production-please}

# ===================================================================
# CORS (comma-separated if multiple origins)
# ===================================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===================================================================
# Actuator
# ===================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ===================================================================
# Logging
# ===================================================================
logging.level.com.gatistack.siletry=INFO